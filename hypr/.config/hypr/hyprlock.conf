# ~/.config/hypr/hyprlock.conf

# --- GENERAL ---
general {
    ignore_empty_input = true       # ignore-empty-password
    disable_loading_bar = true
    hide_cursor = true
}

# --- BACKGROUND & EFFECTS ---
background {
    monitor =
    path = ~/.cache/current_wallpaper.img
    
    # effect-blur=7x5 (radius x passes)
    blur_size = 7
    blur_passes = 5
    
    # effect-vignette=0.5:0.5
    vignette = 0.5
    vignette_darkness = 0.5
}

# --- INPUT FIELD (Indicator) ---
input-field {
    monitor =
    # indicator-radius=120 means width/height is 240. 
    # rounding = -1 makes it a perfect circle.
    size = 240, 240 
    outline_thickness = 10          # indicator-thickness=10
    rounding = -1                   
    
    dots_size = 0.25                # Scale of the dot relative to height
    dots_spacing = 0.2
    dots_center = true
    
    # COLORS
    # ring-color=#ffffff33 -> rgba(255, 255, 255, 0.2)
    outer_color = rgba(255, 255, 255, 0.2) 
    # inside-color=#1e1e1eb3 -> rgba(30, 30, 30, 0.7)
    inner_color = rgba(30, 30, 30, 0.7)    
    # text-color=#ffffff
    font_color = rgb(255, 255, 255)        
    
    # HIGHLIGHTS & STATES
    # ring-ver-color=#ffffff
    check_color = rgb(255, 255, 255)       
    # ring-wrong-color=#f38ba8
    fail_color = rgb(243, 139, 168)        
    # show-failed-attempts
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> 
    
    # indicator-idle-visible
    fade_on_empty = false                  
    font_family = JetBrainsMono Nerd Font Bold
    
    position = 0, -100
    halign = center
    valign = center
}

# --- LABELS (Clock & Date) ---

# Time
label {
    monitor =
    text = $TIME # Default format is %H:%M
    color = rgb(255, 255, 255)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 150
    halign = center
    valign = center
}

# Date
label {
    monitor =
    # Runs the date command to get %a, %b %d
    text = cmd[update:18000000] echo "$(date +'%a, %b %d')"
    color = rgb(255, 255, 255)
    font_size = 24
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 60
    halign = center
    valign = center
}
