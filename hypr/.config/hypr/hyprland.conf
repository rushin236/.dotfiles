#########################################################################################
# HYPRLAND CONFIGURATION 
#########################################################################################

# -----------------------------------------------------
# 1. ENVIRONMENT & VARIABLES
# -----------------------------------------------------
$mainMod = SUPER
# $terminal = alacritty
$terminal = kitty
$menu = rofi -show drun -theme ~/.config/rofi/launcher.rasi

# -----------------------------------------------------
# 2. MONITORS & INPUT
# -----------------------------------------------------
# source = $HOME/.config/hypr/monitors.conf

input {
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# -----------------------------------------------------
# 3. AUTOSTART (EXEC)
# -----------------------------------------------------
# Core Daemons
exec-once = start-portal.sh Hyprland

exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = pkill swaync; swaync
exec-once = hypridle
exec-once = pkill swayosd; swayosd-server
exec-once = sway-audio-idle-inhibit
exec-once = /usr/bin/lxqt-policykit-agent
exec-once = nm-applet --indicator
exec = pkill shikane; shikane
exec = pkill waybar; waybar


# Background apps
exec-once = dex --autostart --environment hyprland
exec-once = fdm --hidden
exec-once = coolercontrol --disable-gpu
exec-once = easyeffects --service-mode -w

# Scripts 
# exec = bash $HOME/.config/waybar/scripts/launch.sh
exec = set-wallpaper.sh

# -----------------------------------------------------
# 4. VISUALS & THEMING
# -----------------------------------------------------
general {
    gaps_in = 11
    gaps_out = 15
    border_size = 0
    
    # GitHub Dark Dimmed Colors (Fallback)
    col.active_border = rgb(9faab8) 
    col.inactive_border = rgb(444c56)
    layout = dwindle
}

decoration {
    rounding = 20
    
    blur {
        enabled = true
        size = 5
        passes = 2
    }

    shadow {
        enabled = true
        range = 15
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 4, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 5, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 3, default
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

# -----------------------------------------------------
# 5. LAYER RULES (GUI & BLUR)
# -----------------------------------------------------
# SwayNC Panel & Notifications
layerrule {
    name = swaync_panel_blur
    match:namespace = ^swaync-control-center$
    blur = on
    ignore_alpha = 0.5
}

layerrule {
    name = swaync_notif_blur
    match:namespace = ^swaync-notification-window$
    blur = on
    ignore_alpha = 0.5
}

layerrule {
    name = swaync_animations
    match:namespace = ^(swaync-.*)$
    animation = slide right
}

# Waybar Glassmorphism
layerrule {
    name = waybar_glassmorphism
    match:namespace = ^waybar$
    blur = on
    ignore_alpha = 0.5
}

# Rofi Glassmorphism
layerrule {
    name = rofi_glassmorphism
    match:namespace = ^rofi$
    blur = on
    ignore_alpha = 0.5
}

# Swayosd Glassmorphism
layerrule {
    name = swayosd_glassmorphism
    match:namespace = ^swayosd$
    blur = on
    ignore_alpha = 0.5
}

# -----------------------------------------------------
# 6. KEYBINDINGS - CORE
# -----------------------------------------------------
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, E, exit
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, Backspace, exec, hyprctl seterror disable

# Custom Scripts
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, X, exec, hyprlock
bind = $mainMod, P, exec, powermenu.sh
bind = $mainMod, M, exec, wayland-monitor.py
bind = $mainMod, A, exec, audio_switch.sh
bind = $mainMod, E, exec, recent_dir.sh

# -----------------------------------------------------
# 7. KEYBINDINGS - MEDIA & CUSTOM SCRIPTS
# -----------------------------------------------------
# Define the monitor fetcher as a variable for the shell (used inside exec)
$get_mon = hyprctl monitors -j | jq -r '.[] | select(.focused == true).name'

# Volume / Media
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --monitor "$($get_mon)" --output-volume 2
bindel = , XF86AudioLowerVolume, exec, swayosd-client --monitor "$($get_mon)" --output-volume -2
bindl  = , XF86AudioMute,        exec, swayosd-client --monitor "$($get_mon)" --output-volume mute-toggle
bindl  = , XF86AudioMicMute,     exec, swayosd-client --monitor "$($get_mon)" --input-volume mute-toggle
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --monitor "$($get_mon)" --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --monitor "$($get_mon)" --brightness lower
bindr  = , Caps_Lock, exec, swayosd-client --monitor "$($get_mon)" --caps-lock
bindl  = , XF86AudioPlay, exec, swayosd-client --monitor "$($get_mon)" --playerctl play-pause
bindl  = , XF86AudioNext, exec, swayosd-client --monitor "$($get_mon)" --playerctl next

# -----------------------------------------------------
# 8. KEYBINDINGS - FOCUS & MOVEMENT
# -----------------------------------------------------
# Move Focus (vim keys & arrows)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d

# Move Windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -----------------------------------------------------
# 9. LAYOUT CONTROL
# -----------------------------------------------------

# Mouse Control
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Split & float & fullscreen
bind = $mainMod, F, fullscreen
bind = $mainMod, T, togglesplit
bind = $mainMod, S, togglegroup
bind = $mainMod, V, togglefloating
bind = $mainMod SHIFT, V, cyclenext, floating

# Center and Resize
bind = $mainMod, Y, exec, hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow

bind = $mainMod, R, submap, resize
submap = resize

binde = , Left, resizeactive, -10 0
binde = , Down, resizeactive, 0 10
binde = , Up, resizeactive, 0 -10
binde = , Right, resizeactive, 10 0

bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mainMod, R, submap, reset
submap = reset
