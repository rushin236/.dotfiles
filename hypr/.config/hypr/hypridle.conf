# ~/.config/hypr/hypridle.conf

general {
    # Command to run when a lock is requested (e.g., via loginctl or a listener below)
    # The 'pidof' check prevents multiple instances of hyprlock from launching.
    lock_cmd = pidof hyprlock || hyprlock
    # Run the lock command before the system goes to sleep
    before_sleep_cmd = loginctl lock-session    
    # Force the display to turn on after waking up from sleep
    after_sleep_cmd = hyprctl dispatch dpms on 
    # Add this line to ensure apps like browsers and Steam can block the idle timer
    ignore_dbus_inhibit = false
}

# --- Lock the session directly after 10 minutes (600 seconds) ---
listener {
    timeout = 600
    on-timeout = loginctl lock-session 
}

# --- Turn off displays after 12 minutes (720 seconds) ---
listener {
    timeout = 720
    # Native Hyprland command to turn off monitors (replaces wlopm --off)
    on-timeout = hyprctl dispatch dpms off
    # Native Hyprland command to turn monitors back on (replaces wlopm --on)
    on-resume = hyprctl dispatch dpms on
}
